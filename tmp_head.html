*{box-sizing:border-box;margin:0;padding:0}
#wrap{font-family:system-ui,sans-serif}
#ctrl{display:flex;gap:5px;align-items:center;flex-wrap:wrap;padding:6px 10px;border-radius:8px 8px 0 0;border:.5px solid #e2e8f0;border-bottom:none;background:#f8fafc}
#ctrl2{display:none;gap:4px;align-items:center;flex-wrap:wrap;padding:4px 10px;border:.5px solid #e2e8f0;border-bottom:none;background:#f8fafc}
.csep{width:.5px;height:16px;background:#e2e8f0;flex-shrink:0}
.clbl{font-size:10.5px;color:#64748b;white-space:nowrap}
.cb{font-size:10.5px;padding:2px 8px;cursor:pointer;border-radius:4px;border:.5px solid #e2e8f0;background:#fff;color:#334155;font-family:inherit;transition:all .15s;white-space:nowrap}
.cb:hover{background:#f1f5f9}.cb.on{background:#e2e8f0;font-weight:600}
.srow{display:flex;align-items:center;gap:5px}
.srow input[type=range]{width:70px;cursor:pointer;accent-color:#3b82f6}
#gs{position:relative;height:570px;border:.5px solid #e2e8f0;border-top:none;overflow:hidden;background:#fff}
#sv{width:100%;height:100%;cursor:grab;display:block}#sv:active{cursor:grabbing}
.ev{fill:none}.ebg{fill:none}.eh{fill:none;stroke:transparent;stroke-width:14;cursor:pointer}
#tt{position:absolute;border:.5px solid #e2e8f0;border-radius:6px;padding:4px 9px;font-size:11px;color:#475569;background:#fff;pointer-events:none;display:none;max-width:240px;z-index:5;line-height:1.5}
#leg{display:flex;flex-wrap:wrap;gap:4px 10px;padding:5px 10px;border:.5px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;background:#f8fafc;align-items:center}
.li{display:flex;align-items:center;gap:4px;font-size:10px}

/* Builder Mode Styles */
#builder-panel{display:none;position:absolute;right:0;top:0;width:260px;height:100%;border-left:.5px solid #e2e8f0;background:#fff;z-index:10;overflow:hidden;flex-direction:column;box-shadow:-2px 0 10px rgba(0,0,0,.05)}
#builder-panel.active{display:flex}
#builder-header{padding:10px 12px;border-bottom:.5px solid #e2e8f0;font-size:11px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
#builder-header button{font-size:10px;padding:3px 8px;border-radius:4px;border:.5px solid #e2e8f0;background:#fff;cursor:pointer}
#builder-header button:hover{background:#f1f5f9}
#belt-container{flex:1;overflow-y:auto;padding:8px}
.belt-section{margin-bottom:12px}
.belt-section-title{font-size:10px;font-weight:600;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:4px}
.belt-node{padding:8px 10px;margin-bottom:6px;border-radius:6px;border:1.5px solid #e2e8f0;cursor:grab;font-size:11px;transition:all .15s;display:flex;align-items:center;gap:8px;background:#fff}
.belt-node:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);transform:translateY(-1px)}
.belt-node.highlighted{border-color:#f59e0b;background:#fef3c7;box-shadow:0 0 0 2px #f59e0b33}
.belt-node.placed{opacity:.4;cursor:not-allowed;border-style:dashed}
.belt-node .node-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.belt-node .node-info{flex:1;min-width:0}
.belt-node .node-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.belt-node .node-type{font-size:9px;color:#64748b}
.belt-node .highlight-badge{width:16px;height:16px;border-radius:50%;background:#f59e0b;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#builder-progress{padding:10px 12px;border-top:.5px solid #e2e8f0;font-size:10px;color:#64748b}
#builder-progress .progress-bar{height:4px;background:#e2e8f0;border-radius:2px;margin-top:6px;overflow:hidden}
#builder-progress .progress-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s}

// ── Build display edges ──────────────────────────────────────────────────
function buildDE(){
  if(!ST.mergeBidi){DE=rawEdges.map((e,i)=>({...e,i,merged:false,revLabel:null}));return;}
  const skip=new Set(),res=[];
  rawEdges.forEach((e,i)=>{
    if(skip.has(i))return;
    const rev=rawEdges.findIndex((r,j)=>j!==i&&!skip.has(j)&&r.sid===e.tid&&r.tid===e.sid);
    if(rev!==-1){skip.add(rev);res.push({...e,i,merged:true,revLabel:rawEdges[rev].label});}
    else res.push({...e,i,merged:false,revLabel:null});
  });
  DE=res;
}

// ── Layout ───────────────────────────────────────────────────────────────
function doLayout(){
  if(ST.swimlanes){
    LANES.forEach(lane=>{
      const nodes=lane.ids.map(id=>NM[id]);
      lane.contentH=nodes.reduce((s,n)=>s+DIM[n.t].h,0)+Math.max(0,nodes.length-1)*NODE_GAP;
      lane.visible=!hiddenLanes.has(lane.key);
    });
    const visH=LANES.filter(l=>l.visible).map(l=>l.contentH);
    const maxH=visH.length?Math.max(...visH):150;
    const totalH=LANE_HDR+LANE_PAD+maxH+LANE_PAD;
    let cx=LANE_PAD; laneLayout={};
    LANES.forEach(lane=>{
      if(!lane.visible){lane.ids.forEach(id=>{NM[id].x=-9999;NM[id].y=-9999;});laneLayout[lane.key]={visible:false};return;}
      lane.x=cx;lane.y=0;lane.w=LANE_W;lane.h=totalH;
      laneLayout[lane.key]={x:cx,y:0,w:LANE_W,h:totalH,visible:true};
      const nodes=lane.ids.map(id=>NM[id]);
      const sy=LANE_HDR+LANE_PAD+(maxH-lane.contentH)/2;
      let ny=sy;
      nodes.forEach(n=>{n.x=f(cx+LANE_W/2);n.y=f(ny+DIM[n.t].h/2);ny+=DIM[n.t].h+NODE_GAP;});
      cx+=LANE_W+LANE_GAP;
    });
  } else {
    const c=LCFG[ST.layout];
    const g=new dagre.graphlib.Graph({multigraph:true});
    g.setGraph({rankdir:c.rankdir,ranksep:c.ranksep,nodesep:c.nodesep,marginx:90,marginy:90,acyclicer:'greedy',ranker:'network-simplex'});
    g.setDefaultEdgeLabel(()=>({}));
    ['E3','E4'].forEach(id=>g.setNode(id,{width:DIM.E.w+8,height:DIM.E.h+8,rank:'min'}));
    N.filter(n=>n.id!=='E3'&&n.id!=='E4').forEach(n=>{const d=DIM[n.t];g.setNode(n.id,{width:d.w+8,height:d.h+8});});
    const seen=new Set();
    rawL.forEach(([s,t])=>{const k=s+'→'+t;if(!seen.has(k)){seen.add(k);g.setEdge(s,t,{},k);}});
    dagre.layout(g);
    N.forEach(n=>{const dn=g.node(n.id);if(dn){n.x=dn.x;n.y=dn.y;}});
  }
}

function isHidden(id){
  if(ST.swimlanes&&hiddenLanes.has(NDOM[id]))return true;
  if(ST.builderMode&&!nodesOnCanvas.has(id))return true;
  return false;
}
function isVis(de){
  // In builder mode, only show edges where both nodes are on canvas
  if(ST.builderMode){
    return nodesOnCanvas.has(de.sid)&&nodesOnCanvas.has(de.tid);
  }
  return!isHidden(de.sid)&&!isHidden(de.tid);
}

// ── Port assignment ──────────────────────────────────────────────────────
function computePorts(){
  const reqs={};
  DE.forEach((de,di)=>{
    if(!isVis(de))return;
    [[de.sid,NM[de.tid],'src'],[de.tid,NM[de.sid],'tgt']].forEach(([nid,other,role])=>{
      if(!reqs[nid])reqs[nid]=[];
      reqs[nid].push({di,role,other});
    });
  });
  const SP=new Array(DE.length).fill(null),TP=new Array(DE.length).fill(null);
  const SS=new Array(DE.length).fill('B'),TS=new Array(DE.length).fill('T');
  function rankSides(n,o){
    const dx=o.x-n.x,dy=o.y-n.y,ax=Math.abs(dx)+.001,ay=Math.abs(dy)+.001;
    const sc={B:dy>0?ax/ay:1e9,T:dy<0?ax/ay:1e9,R:dx>0?ay/ax:1e9,L:dx<0?ay/ax:1e9};
    return['B','T','R','L'].sort((a,b)=>sc[a]-sc[b]);
  }
  Object.entries(reqs).forEach(([nid,items])=>{
    const n=NM[nid],d=DIM[n.t],hw=d.w/2-PMAR,hh=d.h/2-PMAR;
    const cap={T:Math.max(1,Math.floor(hw*2/MIN_SP)),B:Math.max(1,Math.floor(hw*2/MIN_SP)),L:Math.max(1,Math.floor(hh*2/MIN_SP)),R:Math.max(1,Math.floor(hh*2/MIN_SP))};
