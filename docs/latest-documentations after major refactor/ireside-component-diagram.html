<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iReside System — Component Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-900: #003d35;
    --teal-700: #00695c;
    --teal-500: #00897b;
    --teal-300: #4db6ac;
    --teal-100: #b2dfdb;
    --teal-50:  #e0f2f1;
    --amber:    #f59e0b;
    --amber-light: #fef3c7;
    --line:     #37474f;
    --bg:       #0f1a18;
    --surface:  #162420;
    --card:     #1e302c;
    --port:     #00897b;
    --white:    #ffffff;
    --text-dim: #8ab5ae;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 1;
    padding: 48px 60px 32px;
    border-bottom: 1px solid rgba(0,137,123,0.2);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: var(--white);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .header-left h1 span {
    color: var(--teal-300);
  }

  .header-left p {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header-badge {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .badge-teal {
    background: rgba(0,137,123,0.15);
    color: var(--teal-300);
    border: 1px solid rgba(0,137,123,0.3);
  }

  .badge-amber {
    background: rgba(245,158,11,0.12);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.25);
  }

  /* ─── DIAGRAM AREA ─── */
  .diagram-wrap {
    position: relative;
    z-index: 1;
    padding: 40px 40px 20px;
    overflow-x: auto;
  }

  svg {
    display: block;
    margin: 0 auto;
  }

  /* ─── LEGEND ─── */
  .legend {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    padding: 20px 40px 48px;
    border-top: 1px solid rgba(0,137,123,0.12);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  .legend-item svg { flex-shrink: 0; }

  /* ─── TOOLTIP ─── */
  .tooltip {
    position: fixed;
    background: var(--card);
    border: 1px solid rgba(0,137,123,0.4);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--teal-300);
    font-family: 'DM Mono', monospace;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    max-width: 220px;
    line-height: 1.6;
  }

  .tooltip.visible { opacity: 1; }

  /* ─── SVG ANIMATION ─── */
  @keyframes dashIn {
    from { stroke-dashoffset: 800; }
    to   { stroke-dashoffset: 0; }
  }

  .animated-line {
    animation: dashIn 1.2s ease forwards;
  }

  .component-box {
    cursor: pointer;
    transition: filter 0.2s;
  }

  .component-box:hover .comp-rect {
    filter: brightness(1.2);
  }

  @keyframes pulse {
    0%, 100% { r: 13; }
    50% { r: 15; }
  }
</style>
</head>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<script>
  const tooltip = document.getElementById('tooltip');
  const tipped = document.querySelectorAll('[data-tip]');

  tipped.forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      tooltip.textContent = el.getAttribute('data-tip');
      tooltip.classList.add('visible');
    });
    el.addEventListener('mousemove', (e) => {
      const x = e.clientX + 14;
      const y = e.clientY + 14;
      const tw = tooltip.offsetWidth;
      const th = tooltip.offsetHeight;
      const wx = window.innerWidth;
      const wy = window.innerHeight;
      tooltip.style.left = (x + tw > wx ? x - tw - 28 : x) + 'px';
      tooltip.style.top  = (y + th > wy ? y - th - 28 : y) + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });
  });

  // Animate lines on load
  const lines = document.querySelectorAll('line, polyline');
  lines.forEach((l, i) => {
    const len = l.getTotalLength ? l.getTotalLength() : 400;
    l.style.strokeDasharray = len;
    l.style.strokeDashoffset = len;
    l.style.transition = `stroke-dashoffset 0.9s ease ${0.1 + i * 0.07}s`;
    requestAnimationFrame(() => {
      l.style.strokeDashoffset = 0;
    });
  });
</script>
