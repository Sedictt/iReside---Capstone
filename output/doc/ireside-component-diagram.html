<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iReside UML Component Diagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ecf4f2;
      --ink: #146d5f;
      --ink-soft: #2b8b7c;
      --text: #0e3f37;
      --component-fill: #c8e7df;
      --subsystem-fill: #dff2ed;
      --external-fill: #f2f8f6;
      --interface-fill: #d8f1eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .subhead {
      font-size: 12px;
      font-weight: 600;
      color: #3a6f66;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .frame {
      overflow-x: auto;
      border: 1px solid #c1ddd6;
      border-radius: 10px;
      background: #f4fbf8;
      padding: 10px;
    }

    svg {
      display: block;
      margin: 0 auto;
      background: #f4fbf8;
    }

    .subsystem {
      fill: var(--subsystem-fill);
      stroke: var(--ink);
      stroke-width: 2;
    }

    .comp {
      fill: var(--component-fill);
      stroke: var(--ink);
      stroke-width: 2;
      rx: 6;
    }

    .external {
      fill: var(--external-fill);
      stroke: var(--ink);
      stroke-width: 2;
      rx: 6;
      stroke-dasharray: 7 4;
    }

    .port {
      fill: var(--component-fill);
      stroke: var(--ink);
      stroke-width: 2;
    }

    .wire {
      fill: none;
      stroke: var(--ink);
      stroke-width: 2.4;
    }

    .interface-ball {
      fill: var(--interface-fill);
      stroke: var(--ink);
      stroke-width: 2.4;
    }

    .interface-socket {
      fill: none;
      stroke: var(--ink);
      stroke-width: 2.4;
    }

    .label-annotation {
      font-family: "Roboto Mono", monospace;
      font-size: 13px;
      fill: #2f7b6f;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .label-title {
      font-size: 34px;
      font-weight: 700;
      fill: #0d3a34;
    }

    .label-subsystem {
      font-size: 20px;
      font-weight: 700;
      fill: #0f584d;
    }

    .label-comp {
      font-size: 16px;
      font-weight: 700;
      fill: #0f4c43;
    }

    .label-small {
      font-size: 13px;
      font-weight: 500;
      fill: #226d61;
    }

    .legend {
      margin-top: 14px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
      color: #2f7267;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .chip {
      width: 24px;
      height: 10px;
      border: 2px solid var(--ink);
      background: var(--component-fill);
    }
  </style>
</head>
